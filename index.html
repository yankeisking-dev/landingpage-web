<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בדיקת זכאות להחזר מס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Heebo,sans-serif}
body{background:#f4f7fb;color:#222}
.hero{background:linear-gradient(135deg,#0d47a1,#1976d2);color:#fff;padding:70px 20px;text-align:center}
.hero h1{font-size:42px;margin-bottom:15px}
.container{max-width:1100px;margin:auto;padding:20px}
.form-box{background:#fff;padding:30px;border-radius:20px;margin-top:-40px;box-shadow:0 10px 30px rgba(0,0,0,.1)}
.form-group{margin-bottom:15px}
label{display:block;font-weight:700;margin-bottom:5px}
input{width:100%;padding:14px;border:1px solid #ddd;border-radius:10px}
button{width:100%;padding:16px;background:#16a34a;color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-top:40px}
.card{background:#fff;padding:20px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.08)}
.footer{background:#0d47a1;color:#fff;text-align:center;padding:20px;margin-top:50px}
</style>
</head>
<body>
<section class="hero">
<h1>ייתכן שמגיע לכם החזר מס של אלפי שקלים</h1>
<p>בדקו זכאות תוך פחות מדקה וללא התחייבות.</p>
</section>

<div class="container">
<div class="form-box">
<h2>בדיקת זכאות</h2>
<form id="leadForm">
<div class="form-group"><label>שם מלא</label><input type="text" required></div>
<div class="form-group"><label>מספר תעודת זהות</label><input type="text" required></div>
<div class="form-group"><label>טלפון</label><input type="tel" required></div>
<div class="form-group"><label>גיל</label><input type="number" required></div>
<button type="submit">בדקו זכאות עכשיו</button>
</form>
</div>

<div class="cards">
<div class="card"><h3>בדיקה מהירה</h3><p>בדיקת זכאות ראשונית תוך זמן קצר.</p></div>
<div class="card"><h3>ללא התחייבות</h3><p>השאירו פרטים וקבלו בדיקה ראשונית.</p></div>
<div class="card"><h3>ליווי מקצועי</h3><p>נציג יחזור אליכם עם פרטי הזכאות.</p></div>
</div>
</div>

<div class="footer">© LeadMaster</div>
</body>
</html>
